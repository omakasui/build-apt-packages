name: elephant-desktopapplications
type: build
section: utils
priority: optional
homepage: https://github.com/abenz1267/elephant
description: >
  Elephant desktopapplications provider plugin.
  Enables application launcher entries from .desktop files in walker.
  Requires omakasui-elephant to be installed and running.
runtime_depends:
  - omakasui-elephant

produces:
  - omakasui-elephant-desktopapplications

distros:
  - debian13
  - ubuntu2404