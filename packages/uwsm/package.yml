name: uwsm
type: build
arch: all
section: x11
description: >
  Universal Wayland Session Manager.
  Builds from upstream source with the included debian/ packaging.
  Provides a lightweight, modular session management framework
  for Wayland environments based on systemd user units.

# Package emitted by the Dockerfile into /output/ (used by the release step).
produces:
  - omakasui-uwsm

distros:
  - debian13
