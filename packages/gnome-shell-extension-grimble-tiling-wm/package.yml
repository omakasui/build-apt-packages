name: gnome-shell-extension-grimble-tiling-wm
type: build
arch: all
section: gnome
priority: optional
homepage: https://github.com/erwanlem/grimble-tiling-wm
description: >
  Grimble Tiling Window Manager - GNOME Shell extension.
  Brings tiling window manager behaviour to GNOME, with
  customizable keybindings, multi-monitor support and workspaces.
  Installs under /usr/local/share/gnome-shell/extensions/grimble@lmt.github.io/.

runtime_depends:
  - gnome-shell

distros:
  - debian13
  - ubuntu2404