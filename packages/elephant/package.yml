name: elephant
type: repackage
section: utils
priority: optional
homepage: https://github.com/abenz1267/elephant
description: >
  Elephant - powerful data provider daemon for application launchers.
  Communicates via Unix sockets and Protocol Buffers.
  Install provider packages (e.g. elephant-desktopapplications) to add functionality.

produces:
  - elephant
  - elephant-calc
  - elephant-clipboard
  - elephant-desktopapplications
  - elephant-files
  - elephant-menus
  - elephant-providerlist
  - elephant-runner
  - elephant-symbols
  - elephant-todo
  - elephant-unicode
  - elephant-websearch

distros:
  - debian13
  - ubuntu2404