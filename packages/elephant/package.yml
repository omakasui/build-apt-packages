name: elephant
type: build
section: utils
priority: optional
homepage: https://github.com/abenz1267/elephant
description: >
  Elephant - powerful data provider daemon for application launchers.
  Communicates via Unix sockets and Protocol Buffers.
  Install provider packages (e.g. omakasui-elephant-desktopapps) to add functionality.

produces:
  - omakasui-elephant

distros:
  - debian13
  - ubuntu2404