name: niri
type: build
section: x11
priority: optional
homepage: https://github.com/niri-wm/niri
description: >
  Niri is a scrollable-tiling Wayland compositor.
  Windows are arranged in columns on an infinite strip.
  Opening a new window never causes existing windows to resize.
  Supports multi-monitor, fractional scaling, floating windows,
  NVIDIA, touchpads, tablets and Xwayland via xwayland-satellite.

runtime_depends:
  - libseat1
  - libpipewire-0.3-0
  - libpango-1.0-0
  - libegl1
  - libgbm1
  - libxkbcommon0
  - libinput10
  - libdbus-1-3
  - libsystemd0
  - libdisplay-info1 | libdisplay-info2
  - libpangocairo-1.0-0
  - libwayland-server0

produces:
  - niri

distros:
  - debian13
  - ubuntu2404