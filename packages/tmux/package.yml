name: tmux
type: build
section: admin
priority: optional
homepage: https://github.com/tmux/tmux
description: >
  Terminal multiplexer.
  Allows creating multiple terminal sessions within a single window,
  with persistent sessions that survive disconnections.

conflicts:
  - tmux

replaces:
  - tmux

provides:
  - tmux

runtime_depends:
  - libc6
  - libtinfo6 | libncurses6

produces:
  - tmux

distros:
  - debian13
  - ubuntu2404