name: lazydocker
type: build
section: utils
priority: optional
homepage: https://github.com/jesseduffield/lazydocker
description: >
  Lazydocker - a simple terminal UI for Docker and Docker Compose.
  Installs the official upstream release binary for amd64 and arm64.
  Provides a keyboard-driven interface to manage containers, images, and volumes.
runtime_depends:
  - docker.io

produces:
  - omakasui-lazydocker

distros:
  - debian13
  - ubuntu2404