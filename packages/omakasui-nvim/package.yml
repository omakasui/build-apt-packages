name: omakasui-nvim
type: repackage
arch: all
section: editors
priority: optional
homepage: https://github.com/LazyVim/LazyVim
description: >
  Pre-built LazyVim configuration with cached plugins.
  Builds three variants: omakasui-nvim, omakub-nvim, omadeb-nvim.
  Each installs to /usr/share/<project>-nvim/ and provides a setup script.
runtime_depends:
  - nvim
  - git
  - gum

produces:
  - omakasui-nvim
  - omakub-nvim
  - omadeb-nvim

distros:
  - debian13
  - ubuntu2404