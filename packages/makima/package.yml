name: makima
type: build
section: utils
priority: optional
homepage: https://github.com/cyber-sushi/makima
description: >
  Makima - Linux daemon to remap keyboards, mice, controllers and tablets.
  Compiled from upstream source using the Rust toolchain.
  Works on Wayland and X11 via the evdev kernel interface.
  Supports TOML-based per-device config files and hot plugging.

runtime_depends:
  - libc6
  - libgcc-s1
  - libudev1

distros:
  - debian13
  - ubuntu2404