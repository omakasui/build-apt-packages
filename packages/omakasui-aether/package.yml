name: omakasui-aether
type: repackage
arch: all
section: gnome
priority: optional
homepage: https://github.com/bjarneo/aether
description: >
  Aether theme integration for Omakasui.
  Setup script that links Aether themes into the project theme list.
  Requires the standalone aether package for binaries.

runtime_depends:
  - aether
  - gum

produces:
  - omakasui-aether
  - omakub-aether
  - omadeb-aether
  - omari-aether

distros:
  - debian13
  - ubuntu2404
