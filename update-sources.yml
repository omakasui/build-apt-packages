# Upstream version sources for the daily auto-update check.
#
# upstream:         "github:owner/repo" or "gitlab:owner/repo"
# tag_prefix:       Strip this from the tag to get the bare version ("" if the tag IS the version).
# filter_releases:  (optional) Pick first release whose tag starts with tag_prefix.
#                   Use when multiple products share the same repo (e.g. bitwarden/clients).
# use_tags:         (optional) Use git tags instead of GitHub releases.
#                   Use for repos that publish tags only, without GitHub releases.
# prerelease:       (optional) Include GitHub pre-release entries when looking for the latest.

aether:
  upstream: "github:bjarneo/aether"
  tag_prefix: "v"
